series_id: SR03
title: "放課後の残響"
title_en: "After-School Resonance"
genre: [青春群像劇, 学園ミステリ, 微量の超常]
summary: |
  統廃合が決まった地方の県立高校で、一年前に起きた放送部員の死亡事故を、
  無能力の男子高校生が、壊れかけた能力者たちの証言と沈黙をつなぎ合わせて追っていく。
  超能力は真実を暴くための便利な力ではなく、人間関係を壊し、後悔を増幅させる不具合のような現象として存在する。
  最後には、失われるはずだった声と記録を主人公が受け継ぎ、東京へ運ぶ決断をする。
  30話で第一部として大きく一区切り。ただし続編可能な余韻を残す。
world_exposure: none
tone: [不穏, 抒情, 青春, 喪失, 前進]
default_pov: third_person_limited
style_guide:
  style_pattern: 4
  style_note: |
    三人称限定視点を話ごとに切り替える群像スタイル。
    30話中15話前後は瀬尾湊視点。残りは澪(4)、奈央(4)、颯真(3)、千紘(3)、琴葉(1)に分配。
    説明しすぎない。会話、沈黙、仕草、場所の手触りで見せる。
    比喩は過剰に詩的にしすぎない。学校生活の生活感を丁寧に描く。
    超常は小さな不具合として混ぜる。名称化は遅らせる。
    恋愛は補助線にとどめる。各人物に責められる理由と責めきれない理由を持たせる。
  episode_length: 3000
  dialogue_density: medium
  description_density: high
  exposition_density: low
  tempo: medium
main_characters:
  - CHAR-SR03-0001  # 瀬尾湊
  - CHAR-SR03-0002  # 有馬美空
  - CHAR-SR03-0003  # 早瀬澪
  - CHAR-SR03-0004  # 倉橋奈央
  - CHAR-SR03-0005  # 深澤颯真
  - CHAR-SR03-0006  # 白崎千紘
  - CHAR-SR03-0007  # 黒沢琴葉
  - CHAR-SR03-0008  # 桐野直人
  - CHAR-SR03-0009  # 真鍋新
main_locations:
  - LOC-SR03-0001  # 県立星原高校
  - LOC-SR03-0002  # 旧特別棟
main_organizations: []
core_emotions: [不安, 後悔, 沈黙, 再生, 継承]
core_themes:
  - "言えなかったことは消えない"
  - "真実は一人の悪意ではなく複数の沈黙でできている"
  - "地方から消えていく声を誰が次の場所へ運ぶのか"
secondary_themes:
  - "記録されなかった痛み"
  - "選ばれなかった行動の残像"
  - "善意と無神経さの同居"
  - "高校生活の終わりと町の終わり"
  - "聞くことと暴くことの違い"
  - "進路とは逃避ではなく引き受けることでもある"
status:
  current_episode: 0
  canonized_episode: 0
  published_episode: 0
crossover_policy:
  automatic_crossover: false
  require_user_confirmation: true
timeline_policy:
  uses_global_timeline: true
  local_timeline_required: true
episode_policy:
  - "毎話に小さな発見を置く"
  - "情報開示は一気にしない"
  - "感情の焦点を各話ひとつに絞る"
  - "ミステリの進行と人間関係の変化を両輪にする"
  - "終盤は謎解きだけでなく、言い直しのドラマに重心を移す"
ending_policy: |
  湊が声を運ぶ者として東京へ出発する。逃避ではなく継承。
  駅、列車、移動の場面。寂しさはあるが、前進の感触が勝つ。
volume_structure:
  vol1: {episodes: "1-30", title: "放課後の残響（第一部）"}
mystery_structure:
  type: "フーダニットではなく、ハウダニットとホワイダニット、そしてなぜ黙ったかの物語"
  key_questions:
    - "死んだはずの美空の声はなぜ放送に混じったのか"
    - "一年前の夜、誰がどこにいたのか"
    - "救助の10分の遅れはどう生まれたのか"
    - "『声の地図』は何を残そうとしていたのか"
    - "能力者たちの異変は何なのか"
    - "誰が何を守るために嘘をついたのか"
    - "主人公はなぜ東京へ行くのか"
  answer_policy:
    - "物理的・現実的説明を優先しつつ、超常の余白を残す"
    - "黒幕による単純な陰謀にしない"
    - "真相は時系列と感情の両方で再構成する"
    - "最後にすべてを言語で説明しすぎない"
p25ml_integration:
  note: |
    world_exposure: none — 裏設定はほぼ出さない。単独の青春群像劇として成立させる。
    超常現象は P25ML の「超能力」系統に分類可能だが、作中では体系化しない。
    事故夜のトラウマに起因する微弱な異変として描き、超常か心理的後遺症か断定しない。
    舞台は意図的に地名を明示しない地方都市。P25ML の既存舞台（東京都内）とは異なる。
    共有インフラ企業への言及は不要。真鍋の東京の音声アーカイブ施設は独立設定。
constraints:
  must_have:
    - "主人公は男子高校生で無能力"
    - "群像劇である"
    - "超能力は弱く不便"
    - "一年前の死亡事故は単純な殺人ではない"
    - "救助があと10分早ければ助かった可能性"
    - "学校統廃合と旧特別棟撤去"
    - "『声の地図』の再構成"
    - "学校最後の公開放送または記念放送"
    - "ラストで主人公が必然的に東京へ出る"
    - "第一部としてのカタルシス"
  must_not:
    - "派手な異能バトル"
    - "単純な悪の黒幕"
    - "説教臭さ"
    - "主人公を万能な探偵にすること"
    - "地方をただの閉塞の象徴としてのみ描くこと"
    - "超常現象の完全な種明かし"
    - "犯人当てだけで終わる構造"
    - "美空を完全な聖人として描くこと"
    - "ラストの上京を単なる夢や憧れにすること"
notes: |
  能力描写は最初から名称化しない。読者が人物への見方を少しずつ更新できるようにする。
  誰かを断罪して快感を得るのではなく、登場人物たちが自分の未送信の言葉を
  自分の声で言い直すことに最大のカタルシスを置く。
