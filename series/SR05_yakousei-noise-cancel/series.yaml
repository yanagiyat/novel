series_id: SR05
title: "夜行性のノイズキャンセル"
genre: [アーバン・サスペンス, サイコスリラー, 現代ファンタジー]
summary: |
  槻ノ森市の高校生・槙透は、SNSとAIが引き起こす「情報災害（認知汚染）」を
  強烈な耳鳴りとして感知する特異体質を持っていた。
  彼は論理と物理法則を武器にする怠れ者の男・飛羽に拾われ、
  都市を覆い尽くす「快適なファシズム」の波に、ただの屁理屈とアナログな罠で立ち向かう。
  これは、思考を放棄した狂った世界で「間違える自由」を取り戻すための、
  痛快で泥臭い100日間の記録。
world_exposure: medium
tone: [シニカル, 疾走感, やがて熱い]
default_pov: third_person_limited
style_guide:
  style_pattern: 3
  style_note: |
    シニカル＆ドライ文体（パターン3）ベース。
    透の視点章は巻き込まれ型のモノローグ寄り。苛立ちと困惑が基調。
    飛羽の視点章はドライかつ計算的。行動経済学的な分析が混じる。
    ハルカの視点章は軽口と速度重視。
    バトル描写は派手だが「魔法」ではなく「物理トリック＋情報戦」。
    シニカルな表層の下に、徐々に熱さが滲む構造。
  episode_length: 3000
  dialogue_density: high
  description_density: medium
  exposition_density: medium
  tempo: fast
main_characters:
  - CHAR-SR05-0001  # 槙透
  - CHAR-SR05-0002  # 飛羽
  - CHAR-SR05-0003  # ハルカ
main_locations:
  - LOC-G-0003      # 槻ノ森市（グローバル資産）
  - LOC-SR05-0001   # 喫茶ブルー・ノート
  - LOC-SR05-0002   # 大学地下旧共同溝
main_organizations:
  - ORG-G-0010  # 夜漏守
core_emotions: [反骨, 苛立ち, 連帯, 皮肉, 覚醒]
core_themes:
  - "思考の放棄という名の麻薬と、泥だらけの自由意志"
  - "間違える自由を取り戻すこと"
  - "快適なファシズムへの抵抗"
status:
  current_episode: 0
  canonized_episode: 0
  published_episode: 0
crossover_policy:
  automatic_crossover: false
  require_user_confirmation: true
timeline_policy:
  uses_global_timeline: true
  local_timeline_required: true
episode_policy:
  - "各話に小さなミッションまたは情報戦を置く"
  - "バトルは魔法ではなく物理トリック＋情報戦で決着する"
  - "シニカルな表層の下に熱さを徐々に滲ませる"
  - "AIの予測を崩すのは常に「人間の不合理さ」"
ending_policy: |
  AIの論理を崩壊させた後、透は再び名もなき日常へと帰っていく。
  システムは完全には滅びない。だが「間違える自由」は取り戻される。
volume_structure:
  vol1: {episodes: "1-25", title: "日常の裏返りと局所的エラー"}
  vol2: {episodes: "26-50", title: "魔王の顕現と完全包囲網"}
  vol3: {episodes: "51-75", title: "システムの中枢と裏切りの引力"}
  vol4: {episodes: "76-100", title: "大いなる不協和音と自由への投身"}
core_rule:
  name: "非対称なハッキングバトル"
  description: |
    敵は「AIが計算した完璧な群集心理」と「デジタルデータ」。
    対する透たちは「不確定なアナログのノイズ」。
    洗脳された群衆に対して「説得」は行わない。
    【文脈の破壊（物理的エラー）】を強制介入させ、
    AIの予測式をオーバーフローさせて洗脳を物理的に解く。
    例：空から大量のゴムボールを降らせる、スピーカーからお経とユーロビートを同時に流す。
abnormality:
  primary_systems:
    - {id: 11, name: "拡張AIと情報災害", role: "敵の正体。承認欲求と怒りを解析し特定の思想へ誘導する自己進化型アルゴリズム"}
    - {id: 9, name: "超能力", role: "透の耳鳴り。認知汚染を感知するバグ的体質"}
    - {id: 12, name: "超技術と封印技術", role: "敵の中枢サーバーを守る未解明の防壁技術"}
p25ml_integration:
  note: |
    world_exposure: medium — 裏設定が物語を動かす。
    舞台は槻ノ森市（LOC-G-0003）。SR04と同じ舞台だが、本作はテクノロジー・情報災害の層を描く。
    SR04の「静穏」とは異なる角度から同じ街の異常を扱う。時系列の重なりはユーザー確認必須。

    共有資産の使用:
    - エンリング（ORG-G-0002）: 本作の中心インフラ。SNS基盤として情報災害の媒体になる
    - アルカID（ORG-G-0005）: 統合電子決済。市民管理インフラとして機能
    - 三葉トランジット（ORG-G-0004）: 未開通地下空間が最終決戦の舞台
    - 夜漏守（ORG-G-0010）: 飛羽の所属組織。非公式互助組織として本格的に描かれる
    - 玄庫ロジスティクス（ORG-G-0001）: 背景として使用可能

    【重要・共有資産への追記事項】:
    飛羽がエンリングの初期開発者であるという設定は、グローバル資産ORG-G-0002への重大な追記。
    この設定はSR05ローカルの「飛羽の過去」として扱い、エンリングのグローバル設定には
    「初期開発チームの一人が離脱した過去がある」程度の記述に留める。
    他シリーズへの波及はユーザー確認必須。

    上位組織の使用:
    - 夜漏守（ORG-G-0010）を本格使用。他の上位組織（特管局・星流会・蓮華院・オブシディアン）は使用しない
notes: |
  ※元仕様の「槙 徹」はSR02「桐嶋 徹」と漢字衝突のため「槙 透」に変更（読みは同じ「とおる」）。
  ※SR04「槻ノ森、犬も吠えず」と同じ舞台を使用。SR04は「怪異・異界」の静穏を、
  本作は「AI・情報災害」のテクノロジー層を描く。同じ街の異なるレイヤーとして共存可能。
